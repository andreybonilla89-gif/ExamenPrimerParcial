<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Explorador de Lugares Turísticos</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- ENCABEZADO -->
    <header>
        <h1>🌍 Explorador de Lugares Turísticos</h1>
        <p>Busca información turística utilizando una API REST.</p>
    </header>

    <!-- BUSCADOR -->
    <section class="busqueda">

        <label>Ciudad</label>
        <select id="location">
            <option value="Barcelona">Barcelona</option>
            <option value="Amsterdam">Amsterdam</option>
            <option value="Berlin">Berlin</option>
            <option value="Dubay">Dubay</option>
            <option value="London">London</option>
            <option value="Paris">Paris</option>
            <option value="Rome">Rome</option>
            <option value="Tuscany">Tuscany</option>
        </select>

        <label>Categoría</label>
        <select id="category">
            <option value="restaurant">Restaurant</option>
            <option value="attraction">Attraction</option>
            <option value="poi">Point Of Interest</option>
            <option value="accommodation">Accommodation</option>
        </select>

        <label>Palabra clave</label>
        <input type="text" id="keyword" placeholder="Ejemplo: beer">

        <button id="btnBuscar">Buscar</button>

    </section>

    <!-- DETALLES (ARRIBA) -->
    <section id="detalleLugar">

        <h2>Detalles del lugar</h2>

        <div id="contenidoDetalle">
            Selecciona un lugar para ver la información.
        </div>

    </section>

    <!-- RESULTADOS Y FAVORITOS -->
    <main>

        <section>
            <h2>Resultados</h2>
            <div id="listaLugares"></div>
        </section>

        <aside>
            <h2>Favoritos</h2>
            <div id="favoritos"></div>
            <button id="btnEliminarFavoritos">Eliminar todos</button>
        </aside>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>Examen de Programación Web - XMLHttpRequest - LocalStorage</p>
    </footer>

    <!-- JS -->
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
